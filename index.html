<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShortCut - Video Shorts Creator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header -->
    <header class="header">
        <h1>ShortCut</h1>
        <p>Turn any video into shorts for social media</p>
    </header>

    <main class="container">

        <!-- Step 1: Upload -->
        <section class="step" id="stepUpload">
            <div class="upload-zone" id="uploadZone">
                <div class="upload-icon">
                    <svg viewBox="0 0 24 24" width="56" height="56">
                        <path fill="currentColor" d="M18 15v3H6v-3H4v3c0 1.1.9 2 2 2h12a2 2 0 002-2v-3h-2zM7 9l1.41 1.41L11 7.83V16h2V7.83l2.59 2.58L17 9l-5-5-5 5z"/>
                    </svg>
                </div>
                <h3>Drop your video here</h3>
                <p>or click to browse</p>
                <span class="upload-formats">MP4, MOV, AVI, MKV, WebM</span>
                <input type="file" id="fileInput" accept="video/*" hidden>
            </div>
        </section>

        <!-- Step 2: Edit -->
        <section class="step hidden" id="stepEdit">
            <div class="editor-layout">

                <!-- Video Preview -->
                <div class="card preview-card">
                    <video id="videoPlayer" playsinline></video>
                    <div class="video-toolbar">
                        <button class="icon-btn" id="playPauseBtn" title="Play/Pause">
                            <svg id="playIcon" viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
                            <svg id="pauseIcon" viewBox="0 0 24 24" width="22" height="22" class="hidden"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        </button>
                        <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
                        <span class="video-meta" id="videoMeta"></span>
                    </div>

                    <!-- Timeline -->
                    <div class="timeline-wrapper">
                        <div class="timeline" id="timeline">
                            <div class="timeline-loaded" id="timelineLoaded"></div>
                            <div class="timeline-selection" id="timelineSelection"></div>
                            <div class="timeline-handle handle-start" id="handleStart"></div>
                            <div class="timeline-handle handle-end" id="handleEnd"></div>
                            <div class="timeline-playhead" id="timelinePlayhead"></div>
                        </div>
                        <div class="timeline-labels">
                            <span id="labelStart">0:00</span>
                            <span id="labelClip" class="label-clip">0.0s selected</span>
                            <span id="labelEnd">0:00</span>
                        </div>
                    </div>
                </div>

                <!-- Controls Panel -->
                <div class="card controls-card">
                    <h3>Trim</h3>
                    <div class="input-group">
                        <div class="input-row">
                            <label for="startTime">Start</label>
                            <input type="number" id="startTime" value="0" min="0" step="0.1">
                            <button class="btn-ghost" id="setStart">Current</button>
                        </div>
                        <div class="input-row">
                            <label for="endTime">End</label>
                            <input type="number" id="endTime" value="0" min="0" step="0.1">
                            <button class="btn-ghost" id="setEnd">Current</button>
                        </div>
                    </div>

                    <h3>Platforms</h3>
                    <div class="platform-list" id="platformList">
                        <label class="platform selected" data-platform="tiktok">
                            <input type="checkbox" value="tiktok" checked>
                            <span class="platform-check"></span>
                            <span class="platform-icon">
                                <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M16.6 5.82s.51.5 0 0A4.278 4.278 0 0 1 15.54 3h-3.09v12.4a2.592 2.592 0 0 1-2.59 2.5c-1.42 0-2.6-1.16-2.6-2.6 0-1.72 1.66-3.01 3.37-2.48V9.66c-3.45-.46-6.47 2.22-6.47 5.64 0 3.33 2.76 5.7 5.69 5.7 3.14 0 5.69-2.55 5.69-5.7V9.01a7.35 7.35 0 0 0 4.3 1.38V7.3s-1.88.09-3.24-1.48z"/></svg>
                            </span>
                            <span class="platform-detail">
                                <strong>TikTok</strong>
                                <small>9:16 &middot; up to 3 min</small>
                            </span>
                        </label>
                        <label class="platform selected" data-platform="reels">
                            <input type="checkbox" value="reels" checked>
                            <span class="platform-check"></span>
                            <span class="platform-icon">
                                <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M7.8 2h8.4C19.4 2 22 4.6 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8C4.6 22 2 19.4 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2m-.2 2A3.6 3.6 0 0 0 4 7.6v8.8C4 18.39 5.61 20 7.6 20h8.8a3.6 3.6 0 0 0 3.6-3.6V7.6C20 5.61 18.39 4 16.4 4H7.6m9.65 1.5a1.25 1.25 0 0 1 1.25 1.25A1.25 1.25 0 0 1 17.25 8 1.25 1.25 0 0 1 16 6.75a1.25 1.25 0 0 1 1.25-1.25M12 7a5 5 0 0 1 5 5 5 5 0 0 1-5 5 5 5 0 0 1-5-5 5 5 0 0 1 5-5m0 2a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/></svg>
                            </span>
                            <span class="platform-detail">
                                <strong>Instagram Reels</strong>
                                <small>9:16 &middot; up to 90s</small>
                            </span>
                        </label>
                        <label class="platform selected" data-platform="shorts">
                            <input type="checkbox" value="shorts" checked>
                            <span class="platform-check"></span>
                            <span class="platform-icon">
                                <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M10 15l5.19-3L10 9v6m11.56-7.83c.13.47.22 1.1.28 1.9.07.8.1 1.49.1 2.09L22 12c0 2.19-.16 3.8-.44 4.83-.25.9-.83 1.48-1.73 1.73-.47.13-1.33.22-2.65.28-1.3.07-2.49.1-3.59.1L12 19c-4.19 0-6.8-.16-7.83-.44-.9-.25-1.48-.83-1.73-1.73-.13-.47-.22-1.1-.28-1.9-.07-.8-.1-1.49-.1-2.09L2 12c0-2.19.16-3.8.44-4.83.25-.9.83-1.48 1.73-1.73.47-.13 1.33-.22 2.65-.28 1.3-.07 2.49-.1 3.59-.1L12 5c4.19 0 6.8.16 7.83.44.9.25 1.48.83 1.73 1.73z"/></svg>
                            </span>
                            <span class="platform-detail">
                                <strong>YouTube Shorts</strong>
                                <small>9:16 &middot; up to 60s</small>
                            </span>
                        </label>
                        <label class="platform" data-platform="twitter">
                            <input type="checkbox" value="twitter">
                            <span class="platform-check"></span>
                            <span class="platform-icon">
                                <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                            </span>
                            <span class="platform-detail">
                                <strong>Twitter / X</strong>
                                <small>9:16 &middot; up to 2:20</small>
                            </span>
                        </label>
                    </div>

                    <button class="btn-primary" id="generateBtn">
                        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M17.66 11.2C17.43 10.9 17.15 10.64 16.89 10.38C16.22 9.78 15.46 9.35 14.82 8.72C13.33 7.26 13 4.85 13.95 3C13 3.23 12.17 3.75 11.46 4.32C8.87 6.4 7.85 10.07 9.07 13.22C9.11 13.32 9.15 13.42 9.15 13.55C9.15 13.77 9 13.97 8.8 14.05C8.57 14.15 8.33 14.09 8.14 13.93C8.08 13.88 8.04 13.83 8 13.76C6.87 12.33 6.69 10.28 7.45 8.64C5.78 10 4.87 12.3 5 14.47C5.06 14.97 5.12 15.47 5.29 15.97C5.43 16.57 5.7 17.17 6 17.7C7.08 19.43 8.95 20.67 10.96 20.92C13.1 21.19 15.39 20.8 16.89 19.32C18.55 17.68 19.15 15.15 18.23 13C17.84 12.08 17.66 11.63 17.66 11.2Z"/></svg>
                        Generate Shorts
                    </button>

                    <div class="progress-bar hidden" id="progressBar">
                        <div class="progress-fill"></div>
                        <span class="progress-label" id="progressLabel">Processing...</span>
                    </div>
                </div>
            </div>

            <!-- Results -->
            <div class="results hidden" id="results">
                <h2>Your Shorts</h2>
                <div class="results-grid" id="resultsGrid"></div>
            </div>

            <button class="btn-outline center-block hidden" id="newVideoBtn">Upload another video</button>
        </section>

    </main>

    <script src="js/app.js"></script>
</body>
</html>
